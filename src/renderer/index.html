<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Software Contable Pro</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <aside class="sidebar">
    <div class="company-logo">
      <img id="sidebar-logo" src="" alt="Logo Empresa" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none;">
    </div>
    <h2 id="sidebar-title">Contabilidad Pro</h2>
    
    <button class="menu-btn active" data-target="view-empresa-gestion">⚙️ Mi Empresa</button>
  </aside>

  <main class="main-content">
    
    <section id="view-empresa-gestion" class="view-section active">
      <div class="card" style="position: relative;">
          <button id="btnNuevaEmpresa" style="position: absolute; top: 10px; right: 10px; background: #27ae60; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;">➕</button>
          <h2>Empresas Registradas</h2>
          <p><small>Doble clic sobre una empresa para abrir su contabilidad.</small></p>
          <div id="lista-empresas-items" class="empresas-grid">
              </div>
      </div>

      <div class="card">
        <h2>Datos de la Empresa Actual</h2>
        <div class="form-grid">
            <input type="text" id="emp_nombre" placeholder="Nombre Comercial" readonly>
            <input type="text" id="emp_ruc" placeholder="RUC" readonly>
            <input type="text" id="emp_direccion" placeholder="Dirección Fiscal" readonly>
            <input type="text" id="emp_telefono" placeholder="Teléfono" readonly>
            <input type="email" id="emp_correo" placeholder="Correo Electrónico" readonly>
            <input type="text" id="emp_periodo" placeholder="Período Contable" readonly>
        </div>
      </div>

      <!-- Modal para editar empresa -->
      <div id="modalEditarEmpresa" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 20px; border-radius: 8px; width: 500px;">
          <h3>Editar Empresa</h3>
          <form id="formEditarEmpresa">
            <div class="form-grid">
              <input type="text" id="edit_emp_nombre" placeholder="Nombre Comercial" required>
              <input type="text" id="edit_emp_ruc" placeholder="RUC" required>
              <input type="text" id="edit_emp_direccion" placeholder="Dirección Fiscal">
              <input type="text" id="edit_emp_telefono" placeholder="Teléfono">
              <input type="email" id="edit_emp_correo" placeholder="Correo Electrónico">
              <input type="text" id="edit_emp_periodo" placeholder="Período Contable" value="2024">
            </div>
            <div style="margin-top: 15px;">
              <label>Logo de la Empresa:</label>
              <input type="file" id="edit_emp_logo" accept="image/*">
              <img id="preview-logo" src="" alt="Vista previa" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-top: 10px; display: none;">
            </div>
            <div class="button-row">
              <button type="submit">Guardar</button>
              <button type="button" id="btnCerrarModal">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
  </section>

  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
